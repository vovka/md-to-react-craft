name: Prepare Giscus Dependency

on:
  push:
    branches:
      - feat/giscus-comments
    paths:
      - .github/workflows/prepare-giscus-dependency.yml

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/giscus-comments
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install pinned giscus dependency
        run: npm install --save-exact @giscus/react@3.1.0
      - name: Commit dependency files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "Add pinned giscus React dependency"
          git push
