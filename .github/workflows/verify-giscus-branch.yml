name: Verify Giscus Branch

on:
  push:
    branches:
      - feat/giscus-comments
    paths:
      - .github/workflows/verify-giscus-branch.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run process-posts
      - run: npm run build
