name: Verify Final Giscus Branch

on:
  push:
    branches:
      - feat/giscus-comments
    paths:
      - .github/workflows/verify-giscus-final.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/giscus-comments
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run process-posts
      - run: npm run build
      - name: Record successful verification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "verified" > .giscus-build-ok
          git add .giscus-build-ok
          git commit -m "Record successful giscus build verification"
          git push
