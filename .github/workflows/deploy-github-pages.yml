name: Deploy to GitHub Pages

on:
  # Run after the Process Blog Posts workflow completes
  workflow_run:
    workflows: ["Process Blog Posts"]
    types:
      - completed
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          VITE_ANALYTICS_ENABLED: ${{ vars.VITE_ANALYTICS_ENABLED }}
          VITE_ANALYTICS_ENVIRONMENT: ${{ vars.VITE_ANALYTICS_ENVIRONMENT }}
          VITE_ANALYTICS_ALLOWED_HOSTS: ${{ vars.VITE_ANALYTICS_ALLOWED_HOSTS }}
          VITE_ANALYTICS_GA4_MEASUREMENT_ID: ${{ vars.VITE_ANALYTICS_GA4_MEASUREMENT_ID }}
          VITE_ANALYTICS_CLARITY_PROJECT_ID: ${{ vars.VITE_ANALYTICS_CLARITY_PROJECT_ID }}
          VITE_ANALYTICS_CONSENT_REQUIRED: ${{ vars.VITE_ANALYTICS_CONSENT_REQUIRED }}
          VITE_ANALYTICS_CONSENT_STORAGE_KEY: ${{ vars.VITE_ANALYTICS_CONSENT_STORAGE_KEY }}
          VITE_ANALYTICS_POLICY_VERSION: ${{ vars.VITE_ANALYTICS_POLICY_VERSION }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_ROBOTS_INDEX: ${{ vars.VITE_ROBOTS_INDEX }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist directory
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
